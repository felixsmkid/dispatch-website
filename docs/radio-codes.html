<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Codes | SMCD Preview</title>
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark border-bottom border-primary mb-3">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html"><img src="assets/img/logo.svg" height="32" class="me-2">SMCD</a>
        <a class="nav-link text-white" href="dashboard.html">Dashboard</a>
    </div>
</nav>
<div class="container py-4">
    <h2 class="text-primary text-center"><i class="bi bi-broadcast"></i> Radio Codes Reference</h2>
    <p class="text-center text-muted mb-4">SMCD — Emergency Communications Center</p>
    <div class="row g-4" id="codes-container"></div>
</div>
<script>
const sections = {
    '10-Codes': {'10-1':'Meeting','10-2':'Good Signal','10-3':'Stop Transmission','10-4':'OK','10-7':'Not In Service','10-8':'Back In Service','10-9':'Repeat','10-10':'Fight In Progress','10-11':'Someone With Firearms','10-12':'Stand By','10-13A':'Officer Down Emergency','10-13B':'Officer Down Non-Emergency','10-14':'Medic Down','10-20':'Location','10-23':'Arrive On Location','10-31A':'Burglary','10-31B':'Robbery Store','10-34':'Illegal Activity','10-38':'Traffic Stop','10-41':'On Duty','10-42':'Off Duty','10-45A':'Illegal Hunting','10-47':'Injured Person','10-50':'Accident','10-52':'Need EMS','10-57':'Pursuit In Progress','10-60':'Vehicle Description','10-60A':'Car Jacking','10-60B':'Vehicle Theft','10-61':'Suspect Description','10-71A':'Shots Fired On Foot','10-71B':'Shots Fired From Vehicle','10-76':'En Route','10-77':'Need Assistance Non-Emergency','10-78':'Need Assistance Emergency','10-80':'Felony Stop','10-90':'Bank Robbery','10-94':'Illegal Racing','10-95':'Suspect In Custody','10-99':'Investigation Area'},
    'Signal Codes': {'Code 0':'Robbery Principal','Code 2':'Lights Only','Code 3':'Lights and Sirens','Code 4':'Situation Under Control','Code 6':'In Operation'}
};
let html = '';
for (const [title, codes] of Object.entries(sections)) {
    let rows = '';
    for (const [c, m] of Object.entries(codes)) {
        rows += '<tr><td><span class="badge bg-primary">'+c+'</span></td><td>'+m+'</td></tr>';
    }
    html += '<div class="col-lg-6"><div class="card cad-card"><div class="card-header">'+title+'</div><div class="card-body p-0"><table class="table table-dark table-sm mb-0"><thead><tr><th>Code</th><th>Meaning</th></tr></thead><tbody>'+rows+'</tbody></table></div></div></div>';
}
document.getElementById('codes-container').innerHTML = html;
</script>
</body>
</html>
