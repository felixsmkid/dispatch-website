<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SMCD</title>
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
<div id="smcd-loader" class="smcd-loader">
    <div class="smcd-loader-inner text-center">
        <img src="assets/img/logo.svg" alt="SMCD" class="smcd-loader-logo mb-3">
        <h4 class="text-primary fw-bold mb-1">SMCD</h4>
        <p class="text-muted small mb-3">Emergency Communications Center</p>
        <div class="spinner-border text-primary" role="status"></div>
    </div>
</div>

<div class="login-page min-vh-100 d-flex align-items-center justify-content-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="alert alert-info py-2 small text-center mb-3">
                    <i class="bi bi-info-circle"></i> <strong>Mode Preview</strong> — UI statis di GitHub Pages. Tanpa database.
                </div>
                <div class="card login-card border-primary shadow-lg">
                    <div class="card-body p-4 p-md-5 text-center">
                        <img src="assets/img/logo.svg" alt="SMCD" class="login-logo mb-3">
                        <h1 class="h3 text-primary fw-bold mb-0">SMCD</h1>
                        <p class="text-muted small mb-1">Satu Mimpi Central Dispatch</p>
                        <p class="badge bg-primary-subtle text-primary mb-4">Emergency Communications Center</p>

                        <p class="text-muted small mb-3">Pilih halaman untuk preview UI:</p>
                        <div class="d-grid gap-2">
                            <a href="dashboard.html" class="btn btn-primary btn-lg">
                                <i class="bi bi-grid-1x2-fill"></i> Dispatch Dashboard
                            </a>
                            <a href="officer.html" class="btn btn-outline-primary">
                                <i class="bi bi-shield-fill"></i> Officer Panel (LSPD)
                            </a>
                            <a href="radio-codes.html" class="btn btn-outline-secondary">
                                <i class="bi bi-broadcast"></i> Radio Codes
                            </a>
                        </div>

                        <p class="text-muted small mt-4 mb-0">
                            <i class="bi bi-headset"></i> 911 Dispatch &bull; Emergency Communications
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
window.addEventListener('load', function () {
    setTimeout(function () {
        document.getElementById('smcd-loader').classList.add('hidden');
    }, 500);
});
</script>
</body>
</html>
