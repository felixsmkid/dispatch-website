<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Panel | SMCD Preview</title>
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark border-bottom border-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html"><img src="assets/img/logo.svg" height="32" class="me-2">SMCD <span class="badge bg-warning text-dark ms-2">PREVIEW</span></a>
        <a class="nav-link text-white" href="index.html"><i class="bi bi-arrow-left"></i> Menu</a>
    </div>
</nav>

<main class="container-fluid py-3">
    <div class="row g-3">
        <div class="col-lg-4">
            <div class="card border-primary h-100">
                <div class="card-header d-flex align-items-center gap-2">
                    <img src="assets/img/lspd.svg" height="40" alt="LSPD">
                    <div>
                        <h5 class="mb-0">1-Adam-12</h5>
                        <small class="text-muted">J. Martinez — Officer</small>
                    </div>
                </div>
                <div class="card-body">
                    <p><strong>Department:</strong> LSPD</p>
                    <p><strong>Status:</strong> <span class="badge bg-primary">10-23 On Scene</span></p>
                    <label class="form-label">Update Status</label>
                    <select class="form-select mb-3" disabled>
                        <option>10-8 Available</option>
                        <option selected>10-23 On Scene</option>
                        <option>10-38 Traffic Stop</option>
                    </select>
                    <label class="form-label">Location</label>
                    <input type="text" class="form-control mb-3" value="Davis Ave & Innocence" readonly>
                    <button type="button" class="btn btn-danger btn-lg w-100 panic-btn" onclick="showPreviewPanic()">
                        <i class="bi bi-exclamation-triangle-fill"></i> PANIC BUTTON (Demo)
                    </button>
                </div>
            </div>
        </div>
        <div class="col-lg-8">
            <div class="card h-100">
                <div class="card-header"><i class="bi bi-telephone-inbound"></i> My Assigned Calls</div>
                <div class="card-body p-0 table-responsive">
                    <table class="table table-dark table-hover table-sm mb-0">
                        <thead><tr><th>Call #</th><th>Location</th><th>Priority</th><th>Status</th></tr></thead>
                        <tbody id="officer-calls-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="panic-overlay" class="panic-overlay d-none">
    <div class="panic-overlay-content text-center">
        <i class="bi bi-exclamation-octagon-fill display-1 text-white mb-3"></i>
        <h1 class="display-4 fw-bold text-white">OFFICER PANIC</h1>
        <div class="panic-details mx-auto mt-4">
            <p><strong>Officer:</strong> <span id="panic-officer">-</span></p>
            <p><strong>Callsign:</strong> <span id="panic-callsign">-</span></p>
            <p><strong>Department:</strong> <span id="panic-department">-</span></p>
            <p><strong>Location:</strong> <span id="panic-location">-</span></p>
            <p><strong>Time:</strong> <span id="panic-time">-</span></p>
        </div>
        <button class="btn btn-light btn-lg mt-4" onclick="document.getElementById('panic-overlay').classList.add('d-none')">Dismiss</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/preview-data.js"></script>
<script src="assets/js/preview-render.js"></script>
<script>renderPreviewOfficer();</script>
</body>
</html>
